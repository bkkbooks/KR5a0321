front:
  text: 諸師真誥鳥一
  hash: sha256:178f02be6be3a5921b249ecc73fe293c2703296303a741b355c018664eadd3f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0321_HFL_000-001a, image: hfl/0161/0161-004.png}
body:
  text: 元始至尊號志心歸命禮三界之上梵氣彌羅上極無上天中之天鬱羅蕭臺玉山上京渺渺金闕森羅淨泓玄元一氣混沌之先寶珠之中玄之又玄開明三景化生諸天億萬天真無鞅數衆旋斗歷箕回度五常巍巍大範萬道之宗大羅玉清虛無自然至真妙道元始天尊上清號志心歸命禮居上清境號靈寶君祖劫化生九萬九千餘梵氣赤書煥發六百六十八真文因混沌赤文而開九霄紀元洞玉曆而分五劫天經地緯巍乎造化之宗樞隂機陽卓爾雷霆之祖大悲大願大聖大慈玉宸道君靈寶天尊泰清號志心歸命禮隨方設教歷劫度人為皇者師帝者師王者師假名易號立天之道地之道人之道隱聖顯凡總千二百之官君包萬億重之梵氣化行今古著道德凡五千言主握隂陽命雷霆用九五數大悲大願大聖大慈太上老君道德天尊彌羅號志心歸命禮彌羅無上天妙有玄真境渺渺紫金闕太微玉清宫無極無上聖無無復光明寂寂浩無宗玄範總十方湛寂真常道恢漠大神通穹蒼真老妙圓清靜智慧辨才至道至尊三界師混元祖無能聖主四生慈父髙天上聖大慈仁者十號圓滿萬德周身無量度人拔生死苦諸佛之師衆聖之王太上開天執符御曆含真體道金闕雲宫九穹歷御萬道無為大通明殿昊天玉皇大天尊玄穹髙上帝天皇號志心歸命禮紫微宸極勾陳天宫九光寶苑之中五氣玄都之上體元皇而佐司玄化總兩極而共理三才主持兵革之權衡廣推大德統御星辰之躔次母失常經上象巍峩真元恢漠大悲大願大聖大慈勾陳上宫天皇上帝星主號志心歸命禮大羅天闕紫微星宫尊居北極之髙位正中天之上佛號金輪熾盛道稱玉斗玄尊璇璣玉衡齊七政總天經地緯日月星宿約四時行黃道紫垣萬象宗師諸天統御大悲大願大聖大慈萬星教主無極元皇中天紫微北極大帝后土號志心歸命禮九華玉闕七寶皇房承天稟命之期主隂執陽之柄道推尊而舍弘光大德數蓄於柔順利貞效法昊天根本育坤元之美流形品物生成施母道之仁嶽瀆是依山川咸伏大悲大願大聖大慈承天效法后土皇地祇神霄號志心歸命禮髙上神霄府凝神煥照宫會元始祖氣以分真應妙道虛無而開化位乎九霄之上統理諸天總乎十極之中宰制萬化宣金符而垂光濟苦施惠澤而覆育兆民恩溥乾元仁敷浩劫大悲大願大聖大慈玉清真王南極長生大帝統天元聖天尊救苦號志心歸命禮青華長樂界東極妙嚴宫七寶芳騫林九色蓮花座萬真環拱內百億瑞光中上清靈寶尊應化玄元始浩劫垂慈濟大千甘露門妙道真身紫金瑞相隨機赴感誓願無邊大聖大慈大悲大願十方化號普度衆生億億劫中度人無量尋聲赴感太一救苦天尊青玄上帝可韓號志心歸命禮髙上丹霄𨽻元上府朱宫絳闕育神光於浩劫之家寶木騫林現瑞相於太清之境運大化慈悲之造降真精槖籥之機削死上生廣天地一元之德陶魂鑄魄回幽靈萬類之生煥發陽明普疏隂境大悲大願大聖大慈九天青城可韓丈人朱陵度命天尊普化號志心歸命禮九天應元府無上玉清王化形而滿十方談道而趺九鳳三十六天之上閲寶笈考瓊書千五百劫之先位正真權大化手舉金光如意宣説玉樞寶經不順化作微塵發號疾如風火以清淨心而弘大願以智慧力而伏諸魔總司五雷運心三界羣生父萬靈師大聖大慈至皇至道九天應元雷聲普化天尊雷祖號志心歸命禮髙上玉霄府雷霆洞淵宫三境分真九天演化光會大羅之表神通浩渺之天拯水旱於下方祛蟲蝗於歷劫發弘誓願利濟衆生大聖大慈大悲大願九天雷祖大帝除災濟物天尊太一號志心歸命禮髙上琅霄府紫微碧玉宫光煥鬱蕭真凝太極發妙氣於金闕烜大化於混茫回淳風於澆漓之餘保制劫運恢利澤於寰宇之表陶育黔黎大聖大慈大悲大願上清紫微碧玉宫太一大天帝保制劫運天尊洞淵號志心歸命禮髙上太霄境六天洞淵官瑞相端嚴現光明於碧落之境真身廣博敷妙澤於種民之天遏五府之魔靈蕩萬方之瘴癘躋民生於仁壽撫治化於希夷大悲大願大聖大慈六天洞淵大帝伏魔上上太一天尊六波號志心歸命禮紫霄上境六波天宫妙相光明現慈顔於天一宸居寥廓施福惠於人寰捍浩渺之洪災濟炎威之回祿陶鎔萬彚綜理一元大聖大慈大悲大願六波天主帝君普施法潤天尊採訪號志心歸命禮紫玄景曜府九天保運宫至道分光總十方之梵氣真常顯妙回浩劫之澆風采録諸天紀善功而消惡籍恩融萬化摽祿字而上生名大聖大慈大悲大願九天採訪朱陵上帝應元保運妙化天尊斗母號志心歸命禮西天竺國大智光中真空妙相法王師無上玄元天母主金光爍處日月潛輝寶杵旋時鬼神失色顯靈蹤於塵世衛聖駕於閻浮衆生有難若稱名大士尋聲來救苦大悲大願大聖大慈聖德巨光天后摩利支天大聖三官誥唯三聖人乃一太極晉受浩劫家之命鼎膺無量品之褒紫微清虛洞隂總領功過賜福赦罪解厄溥濟存亡道冠諸天恩覃三界大悲大願大聖大慈三元三品三官大帝三宫九府應感天尊火官誥四元四品考較火官運扶乾健德合離明居太陽丹天之中統左府注生之籍盛德在火炎帝持衡功參佐於三元氣運行於四月駕赤龍而行南陸照明熒惑之宫燭朱陵而顯丹臺煥赫文昌之府輝輝朗耀炳炳照臨大悲大願大聖大慈赤皇上品三氣火官炎帝真君洞陽大帝南丹紀壽天尊玄天誥混元六天傳法教主修真得道濟度羣迷普為衆生消除災障八十二化三界祖師大慈大悲救苦救難三元都部署九天遊奕使左天罡北極右垣大將軍鎮天助順真武靈應福德衍慶仁慈正烈協運真君治世福神玉虛師相玄天上帝金闕化身蕩魔終劫濟苦天尊祖天師誥本來南土上泝蜀都先獲黃帝九鼎之丹書後事老君兩度於玉𡱈千軸得修行之要一時成吐納之功法籙全成受盟威品而結璘訣正邪兩辨奪福庭治而化鹹泉德就大丹道齊七政大悲大願大聖大慈三天扶教輔玄體道大法天師雷霆都省泰玄上相都天大法主正一沖玄神化靜應顯佑真君六合無窮髙明大帝降魔護道天尊路祖師誥誕生漢室錫號晉朝惟布氣以降邪曽吞虎而救世管玉霄洞真之法傳玄室內教之經掌雷府刑行都督府使宜之事授天師職升紫微天右相之班判保陽宫主混元教大悲大願大聖大慈真元清皇上帝太虛普惠真君九天寶册司命天尊魏祖誥元皇演化妙有真身光明滿月現慈容清靜玄風開正教道尊聖祖德重醫王主三界之雷霆校羣生之祿籍祖師大慈仁者宸照法王南嶽總仙上真九天司命金闕上保髙元清真紫虛元君仙公誥天台得道閣皂成真昔受東華復傳西蜀詔命玉京金闕位登太極仙班慈憐拯拔於沈淪恩念普資於苦爽葛天氏遺風顯著勾漏令丹砂具存括蒼任遊羅浮乃止翛間玉笥修理金書大悲大願大聖大慈太上玉京東吳太極左宫仙公雷霆玄省天機內相玉虛紫靈普化玄靜常道沖應孚佑真君蠶恩廣救慈悲大帝度人無量天尊真君誥混元始祖一氣分真多劫之前積修至道勤苦備悉經緯逾深萬法千門罔不斯歷救災拔難除害蕩妖功濟生靈名髙王籍衆真推仰宜有甄升大悲大願大孝大仁九州都仙太史髙明大使雷霆泰省天樞伏魔上相至道玄應神功妙濟掌九天司職太一定命注生真君三天按察都檢校普奏諌議大夫天醫大帝度人祖師淨明普化天尊華蓋誥玉清髙聖虛皇至真混元仙主應化分靈含真體道功行圓成驅雷役電福國康民輔佐忠孝滅罪延齡華蓋祖師人天教主僉書雷霆三省上相金闕大仙孚佑顯靈超應護國真君九天掌祿上卿髙玄上帝妙道教主三五飛步正佑妙靈沖應太虛真君南極注生仙卿玄明上帝克誠教主九一上清顯佑感靈誠應妙逺真君北極考校仙卿大明上帝三境化身天尊梓潼誥不驕帝境玉真慶宫現九十八化之行藏顯億千萬種之神異飛鸞開化於在在如意救劫以生生至孝至仁功存乎儒道釋教不驕不樂職盡乎天地水官功德難量威靈莫測大悲大願大聖大慈九天輔元開化主宰司祿職貢舉真君七曲靈應保德弘仁大帝談經演教消劫行化更生永命天尊三茅真君誥天人道德仙聖真師孝悌通於神明恩澤被於家國隱恆山而悟道棲句曲以升天主岱宗恆霍之山職赤城華陽之洞劫運隂陽而統斡雷霆水澤以兼司接二弟之英資授登真之祕訣咸領神仙之籍共膺玉册之榮德博幽明仁霑普率隨機赴感誓願弘深太元妙道沖虛聖佑真應真君地仙上真定録右禁沖靜德佑妙應真君地仙至真三官保命沖惠仁佑神應真君九天司命三茅應化天尊麻始元君誥圓通湛寂定應慈仁崑崙山示現妙身青城洞光顯聖迹過吳度蔡善應誠而感通擲米成丹常遊戲而變化總領羣仙之上包羅萬彚之中錬體九和超功十極大悲大願大聖大慈麻姑真寂沖應仁佑妙濟元君洪崖仙伯誥一氣分真五行育質作上古神農之師表受二儀靈寶之真機常示現於晉唐每垂光於今昔跨雪精於西嶺劃長嘯於開元音動宸旒清絶湛露之殿法傳羽褐綿洪道日之輝澤被寰區恩周普率大悲大願大孝大仁洪崖先生青城仙伯淨明經師應化真君全真五祖誥大道開先玄元闡化教垂今古示號東華接漢室之將軍隱終南而仙契過化每超於劫運示現常在於人寰啓唐朝之英賢悟神仙之祕訣飛劔貨藥警化無方金延丞相之髙標寶印力辭之勇決霞裾上陟南北統宗天復挺於人豪道遍通於四海發金蓮之七朵演仙𣲖於十方長生理被於于今玄妙天垂於率土恢弘至道廣度愚迷全真祖師東華紫府輔玄立極大道帝君正陽開悟傳道垂極帝君純陽演正警化孚佑帝君海蟾明悟弘道純佑帝君重陽全真開化輔極帝君五祖闡道天尊祖元君誥元始化氣清微正宗廣大髙明悟心全於道體剛健統粹生性稟於神靈致雷霆於無為之中包天地於有象之外上極無上會四𣲖之真源玄之又玄參三乘之妙義闡揚大教利濟羣生洞照宫中清微師祖元上侍宸金闕昭凝妙道保仙通化一輝元君北七真誥道先一氣丗顯七真悟五行不到之言得九轉返還之訣甘泉潤物變朽回春金國仙姿得四言而契道衛州變化坐十載以成真壁間墨迹之非凡雪竹月松之姿異二井有多生之記一時著顯化之功磻磎六年龍門七載道功備而名聞時主丹符錫而掌握神仙石上談玄空中飛蓋元主屢宣而問道甘霖剋日以濟民蚤窮易道之言晚造神仙之訣卦圖斯演至道大成清靜散人探玄得道蓬萊仙路億劫獨持慈悲濟苦全真祖師丹陽抱一無為普化真君長真凝神玄靜藴德真君長生輔化宗玄明德真君長春全德神化明應主教真君玉陽體玄廣慈普度真君太古廣寧通玄妙極真君清靜淵貞玄虛順化元君七真演化天尊南五祖誥明真證道行化南天九皇降迹於天台一脈浚通於劉祖采瓊花之仙異著悟真之丹書道付杏林不日還元之篇集法通雞足于焉丹髓之書成真人挺出惠州性地悟超神俊刀圭入口神化無邊施雷雨於掌中蘇民生於世外德彰南海獲瓊玉之英標道遍遐荒飫法言之靈妙龍虎浮羅之迹武夷玉隆之區過化多方真文備著為神仙之首冠集前代之範模誓願弘深慈悲仁聖祖師悟真紫陽真人杏林翠玄真人道光紫賢真人泥丸翠虛真人瓊琯紫清真人虛靖天師誥白雪丹消黃芽舊積文章皇斗老君授三五飛步之玄玉局籙符漢祖傳正一斬邪之旨于以登名於紫府于以掌握於雷霆伐疵癘於青城滅妖氛於下界巍巍蕩蕩妙妙玄玄去太極登紫微聚三華朝五氣隨機格物間邪存神祖師三十代天師虛靖沖弘悟道真君玄風演化天尊侍宸誥髙上神霄玉清雷府光分一氣鍾秀君峯道運五行侍宸徽廟掌中雷雨救旱消災指顧隂晴安邦護國功齊億劫教法祖師德濟羣迷衆生慈父沖虛通妙靈慧真君雷真人誥髙上神霄府玄都執法尊演教大真人玉帝侍御史九天都紏察闡教慈父濟世真師提點三界統攝萬靈瓊都上相混元妙道普濟真君雷聲演教天尊辛天君誥髙上碧霄上清華王東極注生青華大帝南昌火府通明猛吏陽晶錬度執法真人分權定衡真王玄都玉府太極先天沖玄上吏太乙木郎先天都元帥九天考較使司元儲福定命真君鐵筆注律大神光寂通天演法大元帥掌風雲雷雨電霜雪雹銀牙耀目提點三界三十六天雷霆大都督青帝天君元始一氣節制萬靈太乙五雷判府天尊鄧天君誥髙上神霄玉清真王南極長生朱陵大帝太陽九龍皇君南昌上宫受錬真人至真霹靂大仙玄都九嶷九夷蓬萊滄水使者上清三境都元帥九天採訪使應元保運妙化真君歘火律令大神光妙橫天演真大元帥掌行風催雨誅邪破廟祛諸潭洞總統三元八十一天雷霆都總管炎帝天君元始祖劫一氣分真太一雷聲普化天尊張天君誥髙上神霄玉清真王南極保生洞隂大帝暘谷神君清都律令蓬萊都水使九天採察大元帥統攝三十三天雷霆都總管掌雷雲電雨部玉府持奏禦魔天君校籍三界洞淵真宰誅滅五逆賞善罰惡使者飛捷報應真君元始一氣宰御萬靈太乙五雷廣應天尊趙元帥誥靈通丕演聖德昭彰凝形於大梵之初顯化乎無窮之世持鞭提索馭虎降魔飛行三界鬼神驚呼吸一聲天地振威光景朗無願而弗從玄鑑靈明有求而皆應救生靈疾苦保家國安寧贊揚道法以無窮亶鎮玄風於水劫大悲大願大聖大慈扶天廣聖如意沖和大神君諸師真誥終
